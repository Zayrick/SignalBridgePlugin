name: Latest main builds

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: signalbridge-main-latest
  cancel-in-progress: false

env:
  BUILD_TYPE: Release
  SIGNALBRIDGEPLUGIN_COMMIT: ${{ github.sha }}

jobs:
  build:
    name: SignalBridgePlugin-API${{ matrix.api_version }}-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    env:
      ASSET_NAME: SignalBridgePlugin-API${{ matrix.api_version }}-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        api_version: [4, 5]
        target:
          - qt5-windows-x64
          - qt5-windows-x86
          - qt6-windows-x64
          - qt5-linux-amd64
          - qt5-linux-i386
          - qt5-linux-arm64
          - qt5-linux-armhf
          - qt6-linux-amd64
          - qt6-linux-i386
          - qt6-linux-arm64
          - qt6-linux-armhf
          - qt5-macos-apple
          - qt5-macos-intel
          - qt6-macos-apple
          - qt6-macos-intel
        include:
          - target: qt5-windows-x64
            os: windows
            runner: windows-2022
            install_qt_action: true
            qt_version: '5.15.2'
            qt_host: windows
            qt_arch: win64_msvc2019_64
            cmake_arch: x64
          - target: qt5-windows-x86
            os: windows
            runner: windows-2022
            install_qt_action: true
            qt_version: '5.15.2'
            qt_host: windows
            qt_arch: win32_msvc2019
            cmake_arch: Win32
          - target: qt6-windows-x64
            os: windows
            runner: windows-2022
            install_qt_action: true
            qt_version: '6.10.3'
            qt_host: windows
            qt_arch: win64_msvc2022_64
            cmake_arch: x64
          - target: qt5-linux-amd64
            os: linux
            runner: ubuntu-24.04
            platform: linux/amd64
            qt_package: qtbase5-dev
          - target: qt5-linux-i386
            os: linux
            runner: ubuntu-24.04
            platform: linux/386
            qt_package: qtbase5-dev
          - target: qt5-linux-arm64
            os: linux
            runner: ubuntu-24.04
            platform: linux/arm64
            qt_package: qtbase5-dev
          - target: qt5-linux-armhf
            os: linux
            runner: ubuntu-24.04
            platform: linux/arm/v7
            qt_package: qtbase5-dev
          - target: qt6-linux-amd64
            os: linux
            runner: ubuntu-24.04
            platform: linux/amd64
            qt_package: qt6-base-dev
          - target: qt6-linux-i386
            os: linux
            runner: ubuntu-24.04
            platform: linux/386
            qt_package: qt6-base-dev
          - target: qt6-linux-arm64
            os: linux
            runner: ubuntu-24.04
            platform: linux/arm64
            qt_package: qt6-base-dev
          - target: qt6-linux-armhf
            os: linux
            runner: ubuntu-24.04
            platform: linux/arm/v7
            qt_package: qt6-base-dev
          - target: qt5-macos-apple
            os: macos
            runner: macos-15
            cmake_arch: arm64
            brew_qt: qt@5
          - target: qt5-macos-intel
            os: macos
            runner: macos-15-intel
            cmake_arch: x86_64
            install_qt_action: true
            qt_version: '5.15.2'
            qt_host: mac
            qt_arch: clang_64
          - target: qt6-macos-apple
            os: macos
            runner: macos-15
            cmake_arch: arm64
            install_qt_action: true
            qt_version: '6.10.3'
            qt_host: mac
            qt_arch: clang_64
          - target: qt6-macos-intel
            os: macos
            runner: macos-15-intel
            cmake_arch: x86_64
            install_qt_action: true
            qt_version: '6.10.3'
            qt_host: mac
            qt_arch: clang_64

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Qt
        if: matrix.install_qt_action == true
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Build
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & cmake -S . -B build -A "${{ matrix.cmake_arch }}" "-DCMAKE_CONFIGURATION_TYPES=$env:BUILD_TYPE" "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR" -DSIGNALBRIDGE_BUILD_TESTS=OFF "-DSIGNALBRIDGE_OPENRGB_API_VERSION=${{ matrix.api_version }}"
          & cmake --build build --config "$env:BUILD_TYPE" --target SignalBridgePlugin --parallel
          New-Item -ItemType Directory -Force package, dist | Out-Null
          $plugin = Get-ChildItem build -Recurse -Filter SignalBridgePlugin.dll | Where-Object { $_.FullName -match "\\$env:BUILD_TYPE\\" } | Select-Object -First 1
          if (-not $plugin) { throw "SignalBridgePlugin.dll not found" }
          Copy-Item $plugin.FullName package\
          Copy-Item LICENSE package\
          Compress-Archive -Path package\* -DestinationPath "dist\$env:ASSET_NAME.zip" -Force

      - name: Enable Linux emulation
        if: matrix.os == 'linux' && matrix.platform != 'linux/amd64'
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Build
        if: matrix.os == 'linux'
        run: |
          docker run --rm --platform "${{ matrix.platform }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e SIGNALBRIDGEPLUGIN_COMMIT \
            -e ASSET_NAME \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:bookworm \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends build-essential ca-certificates cmake ninja-build pkg-config ${{ matrix.qt_package }} libgl1-mesa-dev libudev-dev libusb-1.0-0-dev
              cmake -S . -B "build/$ASSET_NAME" -G Ninja -DCMAKE_BUILD_TYPE=Release -DSIGNALBRIDGE_BUILD_TESTS=OFF -DSIGNALBRIDGE_OPENRGB_API_VERSION=${{ matrix.api_version }}
              cmake --build "build/$ASSET_NAME" --target SignalBridgePlugin --parallel
              mkdir -p package dist
              plugin="$(find "build/$ASSET_NAME" -name libSignalBridgePlugin.so -type f | head -n 1)"
              test -n "$plugin"
              cp "$plugin" package/
              cp LICENSE package/
              tar -C package -czf "dist/$ASSET_NAME.tar.gz" .
              chown -R "$HOST_UID:$HOST_GID" "build/$ASSET_NAME" package dist
            '

      - name: Install Ninja
        if: matrix.os == 'macos'
        run: brew install ninja

      - name: Install Qt
        if: matrix.brew_qt != ''
        run: brew install ${{ matrix.brew_qt }}

      - name: Build
        if: matrix.os == 'macos'
        run: |
          if [ -n "${{ matrix.brew_qt }}" ]; then
            qt_prefix="$(brew --prefix "${{ matrix.brew_qt }}")"
          else
            qt_prefix="${QT_ROOT_DIR}"
          fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" -DCMAKE_PREFIX_PATH="${qt_prefix}" -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake_arch }}" -DSIGNALBRIDGE_BUILD_TESTS=OFF -DSIGNALBRIDGE_OPENRGB_API_VERSION=${{ matrix.api_version }}
          cmake --build build --target SignalBridgePlugin --parallel
          mkdir -p package dist
          plugin="$(find build \( -name libSignalBridgePlugin.dylib -o -name SignalBridgePlugin.dylib \) -type f | head -n 1)"
          test -n "$plugin"
          cp "$plugin" package/
          cp LICENSE package/
          tar -C package -czf "dist/$ASSET_NAME.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_NAME }}
          path: dist/${{ env.ASSET_NAME }}.*
          if-no-files-found: error

  publish:
    name: Publish main-latest
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: SignalBridgePlugin-API*-qt*-*
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: main-latest
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TAG"

          notes="Automated builds from main at ${GITHUB_SHA}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Latest main builds" --notes "$notes" --prerelease
          else
            gh release create "$TAG" --title "Latest main builds" --notes "$notes" --prerelease
          fi

          gh release upload "$TAG" release-assets/* --clobber
